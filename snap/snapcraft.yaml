name: caldisplay
base: core24
version: '1.2.1'
icon: assets/caldisplay.svg
summary: Multi-view calendar, weather, and clock display system
title: CalDisplay
description: |
  A versatile calendar, weather, and clock display application ideal for
  wall-mounted screens, reception areas, meeting rooms, kiosks, and other
  always-on displays in homes, offices, schools, and public venues.
  
  Features:
  - Multiple calendar views: Day, Week, Month, Two-Month, and Weather tab
  - Color-coded event sources for easy visual distinction
  - Customizable visible tabs with reordering capability
  - Read-only calendar feed support (ICS, webcal, and local .ics files)
  - Weather tab with current conditions, hourly & extended forecasts, and alerts
  - Real-time clock display with format options (12/24-hour)
  - Automatic refresh with configurable intervals for calendars and weather
  - Resume-aware stale-data checks to catch up after suspend/sleep
  - Dual launch modes: full-screen kiosk and windowed configuration
  - Optimized for low-power hardware and minimal resource consumption

license: GPL-3.0-or-later
contact: eeickmeyer@ubuntu.com
website: https://ericheickmeyer.com
donation: https://ubuntustudio.org/contribute
issues: https://github.com/eeickmeyer/CalDisplay/issues
source-code: https://github.com/eeickmeyer/CalDisplay

confinement: strict
grade: stable

parts:
  qt6:
    plugin: nil
    stage-packages:
      - libqt6core6
      - libqt6gui6
      - libqt6qml6
      - libqt6quick6
      - libqt6network6
      - libqt6svg6
      - libqt6widgets6
      - libqt6positioning6
      - papirus-icon-theme
      - libxkbcommon0
      - libfontconfig1
      - libx11-6
      - libxext6
      - libharfbuzz0b
      - libproxy1v5
      - libb2-1
      - libxcb-util1
      - qml6-module-qtquick-controls
      - qml6-module-qtquick-layouts
      - qml6-module-qtquick-window
      - qml6-module-qtqml-workerscript
      - qml6-module-qtquick-templates
    organize:
      usr/lib/x86_64-linux-gnu/libproxy/libpxbackend-1.0.so: usr/lib/x86_64-linux-gnu/libpxbackend-1.0.so
    prime:
      - -usr/lib/**/libEGL_mesa.so*
      - -usr/lib/**/libGLX_mesa.so*
      - -usr/lib/**/libXext.so*
      - -usr/lib/**/libXxf86vm.so*
      - -usr/lib/**/libicuio.so*
      - -usr/lib/**/libicutest.so*
      - -usr/lib/**/libicutu.so*
      - -usr/lib/**/libvulkan.so*
      - -usr/lib/**/libwayland-client.so*
      - -usr/share/applications
      - -usr/share/doc
      - -usr/share/man
  
  caldisplay:
    plugin: cmake
    source: .
    after: [qt6]
    build-packages:
      - build-essential
      - cmake
      - qt6-base-dev
      - qt6-declarative-dev
      - qt6-svg-dev
      - qt6-positioning-dev
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
    override-build: |
      craftctl default
      # Prevent stale launcher artifacts from incremental builds.
      rm -f "$CRAFT_PART_INSTALL/usr/share/applications/caldisplay-windowed.desktop"
    organize:
      usr/bin/CalDisplay: bin/CalDisplay
      usr/share/CalDisplay/qml: share/CalDisplay/qml
      usr/share/applications/caldisplay.desktop: usr/share/caldisplay/desktop/caldisplay.desktop
      usr/share/applications/caldisplay-kiosk.desktop: usr/share/caldisplay/desktop/caldisplay-kiosk.desktop
      usr/share/icons/hicolor/scalable/apps/caldisplay.svg: share/icons/hicolor/scalable/apps/caldisplay.svg
    prime:
      - bin/CalDisplay
      - share/CalDisplay/qml
      - usr/share/caldisplay/desktop/caldisplay.desktop
      - usr/share/caldisplay/desktop/caldisplay-kiosk.desktop
      - -usr/share/**/caldisplay-windowed.desktop
      - share/icons/hicolor/scalable/apps/caldisplay.svg
      - -usr/share/doc
      - -usr/share/man

apps:
  caldisplay:
    command: bin/CalDisplay --windowed
    environment:
      QT_QUICK_BACKEND: software
      QT_QPA_PLATFORM: xcb
      QT_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins
      QT_QPA_PLATFORM_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins/platforms
      QML2_IMPORT_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/qml
      QML_IMPORT_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/qml
      DBUS_FATAL_WARNINGS: "0"
    plugs:
      - home
      - network
      - network-bind
      - opengl
      - removable-media
      - x11
      - location-observe
    desktop: usr/share/caldisplay/desktop/caldisplay.desktop

  caldisplay-kiosk:
    command: bin/CalDisplay
    environment:
      QT_QUICK_BACKEND: software
      QT_QPA_PLATFORM: xcb
      QT_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins
      QT_QPA_PLATFORM_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/plugins/platforms
      QML2_IMPORT_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/qml
      QML_IMPORT_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt6/qml
      DBUS_FATAL_WARNINGS: "0"
    plugs:
      - home
      - network
      - network-bind
      - opengl
      - removable-media
      - x11
      - location-observe
    desktop: usr/share/caldisplay/desktop/caldisplay-kiosk.desktop
