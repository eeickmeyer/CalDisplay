<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .bg { fill: #0f1720; }
      .border { fill: #2d3748; }
      .accent { fill: #4fd1c5; }
      .grid { stroke: #2d3748; stroke-width: 2; fill: none; }
      .text { fill: #f7fafc; font-family: monospace; font-size: 16px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" class="bg"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="240" height="240" rx="12" ry="12" class="border" stroke-width="2"/>

  <!-- Calendar grid -->
  <g class="grid">
    <!-- Header bar -->
    <rect x="16" y="16" width="224" height="40" rx="8" ry="8"/>
    
    <!-- Calendar rows (3x3 grid of days) -->
    <rect x="16" y="60" width="224" height="40" rx="4" ry="4"/>
    <rect x="16" y="104" width="224" height="40" rx="4" ry="4"/>
    <rect x="16" y="148" width="224" height="40" rx="4" ry="4"/>
    <rect x="16" y="192" width="224" height="40" rx="4" ry="4"/>
  </g>

  <!-- Accent elements (simulating event highlights) -->
  <circle cx="80" cy="180" r="12" class="accent" opacity="0.7"/>
  <circle cx="176" cy="76" r="12" class="accent" opacity="0.7"/>

  <!-- Clock symbol (center) -->
  <g transform="translate(128, 220)">
    <circle cx="0" cy="0" r="16" class="accent" opacity="0.5"/>
    <line x1="0" y1="-12" x2="0" y2="0" stroke="#f7fafc" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="8" y2="0" stroke="#f7fafc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Family calendar text hint (top) -->
  <text x="128" y="35" class="text" text-anchor="middle" font-size="14">Family</text>
</svg>
